services:
  buildkit:
    image: moby/buildkit:latest
    container_name: buildkit
    privileged: true
    restart: unless-stopped
    volumes:
      - buildkit-cache:/var/lib/buildkit

  backend:
    build: ./backend
    container_name: velox-backend
    depends_on:
      - buildkit
    env_file:
      - .env.local
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3001:3001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /app
    command: npm run dev

  caddy:
    image: caddy:latest
    container_name: velox-caddy
    env_file:
      - .env.local
    ports:
      - "${CADDY_HTTP_PORT:-8080}:${CADDY_HTTP_PORT:-8080}"
    volumes:
      - ./backend/caddy/Caddyfile.local:/etc/caddy/Caddyfile:ro

volumes:
  buildkit-cache:
