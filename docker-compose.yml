services:
  buildkit:
    image: moby/buildkit:latest
    container_name: buildkit
    privileged: true
    restart: unless-stopped
    volumes:
      - buildkit-cache:/var/lib/buildkit

  backend:
    build: ./backend
    container_name: velox-backend
    depends_on:
      - buildkit
    environment:
      BUILDKIT_HOST: docker-container://buildkit
      DEPLOYMENT_HOST: host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3001:3001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /app
    command: npm run dev

  caddy:
    image: caddy:latest
    container_name: velox-caddy
    ports:
      - "8080:8080"
    volumes:
      - ./backend/caddy/Caddyfile:/etc/caddy/Caddyfile

volumes:
  buildkit-cache:
